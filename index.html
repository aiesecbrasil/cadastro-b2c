<!DOCTYPE html>
<html lang="pt-BR">
    <!--
      Documento HTML principal do formulário de cadastro de cards.
      Estrutura semântica com componentes dinâmicos renderizados via assets/js/script.js.
      Manter este arquivo minimalista: a lógica está toda no JS; o estilo, no CSS.
      Acessibilidade: labels associados por for/id, mensagens de erro próximas aos campos.
    -->
    <head>
        <meta charset="UTF-8">
        <title>Formulário de Cadastro - AIESEC</title>
        <!--
          Dependências externas:
          - Pikaday: componente de calendário (apenas CSS aqui, JS no fim do body)
          - Bootstrap 5: layout do modal e utilidades
        -->
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/pikaday/css/pikaday.css">

        <link
            href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap"
            rel="stylesheet">

        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous">
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
            rel="stylesheet">
        <link rel="stylesheet" href="./assets/css/style.css">
        <meta name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <!--
          Notas:
          - Os campos de Produto, AIESEC e Como conheceu podem ser criados dinamicamente, dependendo de parâmetros UTM.
          - Não remover comentários existentes; as anotações abaixo apenas complementam a documentação.
        -->
    </head>

    <body>
        <!-- Estrutura de Abas para os modos de cadastro -->
        <ul class="nav nav-tabs" id="form-modes" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="individual-tab"
                    data-bs-toggle="tab" data-bs-target="#individual-panel"
                    type="button" role="tab" aria-controls="individual-panel"
                    aria-selected="true">Cadastro Individual</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="bulk-tab" data-bs-toggle="tab"
                    data-bs-target="#bulk-panel" type="button" role="tab"
                    aria-controls="bulk-panel" aria-selected="false">Cadastro em
                    Massa</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="upload-tab" data-bs-toggle="tab"
                    data-bs-target="#upload-panel" type="button" role="tab"
                    aria-controls="upload-panel" aria-selected="false">Upload de
                    Arquivo</button>
            </li>
        </ul>

        <!-- Conteúdo das Abas -->
        <div class="tab-content" id="form-modes-content">
            <!-- Aba 1: Cadastro Individual (Formulário existente) -->
            <div class="tab-pane fade show active" id="individual-panel"
                role="tabpanel" aria-labelledby="individual-tab">
                <div class="progress" id="progress">Formulário de Cadastro -
                    AIESEC</div>
                <form id="meuForm"
                    aria-describedby="erro-nome erro-sobrenome erro-email erro-telefone erro-nascimento erro-politica">

                    <div class="stage active" data-stage="1">
                        <!-- Nome e Sobrenome -->
                        <div class="row">
                            <div class="col-12 col-md-6">
                                <div class="input-group">
                                    <input type="text" id="nome" placeholder=" "
                                        required
                                        aria-required="true"
                                        aria-describedby="erro-nome" />
                                    <label for="nome">Nome *</label>
                                    <span class="error-msg" id="erro-nome"
                                        role="alert"
                                        aria-live="polite"></span>
                                </div>
                            </div>

                            <div class="col-12 col-md-6">
                                <div class="input-group">
                                    <input type="text" id="sobrenome"
                                        placeholder=" "
                                        required
                                        aria-required="true"
                                        aria-describedby="erro-sobrenome" />
                                    <label for="sobrenome">Sobrenome *</label>
                                    <span class="error-msg" id="erro-sobrenome"
                                        role="alert"
                                        aria-live="polite"></span>
                                </div>
                            </div>
                        </div>

                        <!-- Emails -->
                        <label for="emails-container">Email *</label>
                        <div id="emails-container"
                            aria-describedby="erro-email"></div>
                        <button type="button" id="email" class="add-btn"
                            onclick="addEmail()"
                            aria-label="Adicionar outro email">Adicionar
                            outro</button>
                        <div class="error-msg" id="erro-email" role="alert"
                            aria-live="polite"></div>

                        <!-- Telefones -->
                        <label for="telefones-container">Telefone *</label>
                        <div id="telefones-container"
                            aria-describedby="erro-telefone"></div>
                        <button type="button" class="add-btn" id="telefone"
                            onclick="addTelefone()"
                            aria-label="Adicionar outro telefone">Adicionar
                            outro</button>
                        <div class="error-msg" id="erro-telefone" role="alert"
                            aria-live="polite"></div>

                        <!-- Data de nascimento -->
                        <label for="nascimento">Data de Nascimento *</label>
                        <div class="input-calendario">
                            <input type="text" id="nascimento"
                                placeholder="DD/MM/YYYY"
                                maxlength="10"
                                aria-describedby="erro-nascimento" />
                            <span aria-hidden="true">📅</span>
                        </div>
                        <input type="hidden" id="nascimento-iso"
                            name="nascimento" />
                        <div class="error-msg" id="erro-nascimento"
                            role="alert"
                            aria-live="polite"></div>
                        <!-- Produto -->
                        <div id="produtos" class="input-extra"></div>

                        <!-- AIESEC mais próxima -->
                        <div id="aiesecs" class="input-extra"></div>

                        <!-- Como conheceu -->
                        <div id="conheceAiesec" class="input-extra"></div>

                        <!-- Campo de Tag -->
                        <div class="input-group">
                            <input type="text" id="tag" placeholder=" " />
                            <label for="tag">Tag (Opcional)</label>
                            <span class="error-msg" id="erro-tag" role="alert"
                                aria-live="polite"></span>
                        </div>

                        <!-- Checkbox Política de Privacidade -->
                        <div class="input-extra checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="politica"
                                    name="politica"
                                    required aria-required="true" />
                                <span><strong>Eu concordo com a coleta e uso dos
                                        meus
                                        dados
                                        conforme a Política de Privacidade
                                        *</strong></span>
                            </label>
                            <div class="checkbox-msg">
                                Estamos coletando seus dados para enviar
                                informações
                                sobre
                                oportunidades de intercâmbio. Seus dados serão
                                tratados
                                conforme a LGPD e não serão compartilhados sem
                                consentimento.
                            </div>
                            <div class="error-msg" id="erro-politica"
                                role="alert"
                                aria-live="polite"></div>
                        </div>
                    </div>
                    <div class="stage-controls">
                        <button class="next" type="button"
                            id="btn-next">Enviar</button>
                    </div>
                </form>
            </div>

            <!-- Aba 2: Cadastro em Massa -->
            <div class="tab-pane fade" id="bulk-panel" role="tabpanel"
                aria-labelledby="bulk-tab">
                <!-- Conteúdo gerado via JavaScript -->
            </div>

            <!-- Aba 3: Upload de Arquivo -->
            <div class="tab-pane fade" id="upload-panel" role="tabpanel"
                aria-labelledby="upload-tab">
                <!-- Conteúdo gerado via JavaScript -->
            </div>
        </div>

        <span class="copyright">&copy; AIESEC no Brasil - 2026</span>
        <!-- Modal -->
        <div class="modal fade" id="exampleModalLong" tabindex="-1"
            aria-labelledby="exampleModalLongTitle" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title"
                            id="exampleModalLongTitle">Confirme seus dados:</h5>
                        <button type="button" class="btn-close"
                            data-bs-dismiss="modal" aria-label="Close"
                            id="botaoFechar"></button>
                    </div>
                    <div class="modal-body">
                        <pre id="DadosAqui"></pre>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal"
                            id="botaoCancelar">Cancelar</button>
                        <button type="button" class="btn btn-primary"
                            id="botaoConfirmar">Enviar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- JS externos carregados ao final para não bloquear a renderização -->
        <script src="https://cdn.jsdelivr.net/npm/pikaday/pikaday.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
        <script src="./assets/js/script.js"></script>
    </body>

</html>
